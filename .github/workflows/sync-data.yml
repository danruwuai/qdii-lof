name: Sync QDII Data to Cloudflare D1

on:
  schedule:
    # 工作日 9:00, 11:00, 13:00, 15:00, 17:00, 19:00, 21:00 (北京时间)
    - cron: '0 1,3,5,7,9,11,13 * * 1-5'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Configure Wrangler
        run: |
          mkdir -p ~/.config/wrangler
          cat > ~/.config/wrangler/config.yml << EOF
          account_id = "${CLOUDFLARE_ACCOUNT_ID}"
          EOF
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run data fetch and sync
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd backend
          python3 sync_to_d1.py --full --table funds
          python3 sync_to_d1.py --full --table fund_holdings
          python3 sync_to_d1.py --table premium_snapshots

      - name: Verify
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd backend
          python3 -c "
          import subprocess
          r = subprocess.run(['wrangler', 'd1', 'execute', 'qdii-lof-db', '--remote', '--command', 'SELECT COUNT(*) as c FROM funds'], capture_output=True, text=True)
          print(r.stdout)
          if r.stderr: print(r.stderr[:200])
          "
